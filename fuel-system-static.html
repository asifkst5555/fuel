<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>হাটহাজারী ফুয়েল মনিটর</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        html { font-size: 80%; }
        :root {
            --page-bg: #f4f7fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --text-main: #14233b;
            --text-soft: #6d7b91;
            --border: #e4ebf3;
            --primary: #1e40af;
            --success: #0f9f64;
            --success-soft: #e7f8f1;
            --danger: #e04747;
            --danger-soft: #feebee;
            --amber: #cc8b18;
            --amber-soft: #fff5df;
            --shadow-lg: 0 24px 60px rgba(27, 44, 76, 0.08);
            --shadow-md: 0 14px 36px rgba(27, 44, 76, 0.06);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 16px;
            --admin-bg: #f4f7fb;
            --admin-surface: #ffffff;
            --admin-surface-soft: #f8fbff;
            --admin-border: #e3eaf3;
            --admin-text: #13233d;
            --admin-soft: #6f8099;
            --admin-primary: #2448d8;
            --admin-primary-soft: #eaf0ff;
            --admin-success: #0d9960;
            --admin-danger: #dd4a4a;
            --admin-warning: #ce8a19;
            --admin-shadow: 0 18px 50px rgba(23, 39, 70, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans Bengali", "Hind Siliguri", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top center, rgba(30, 64, 175, 0.08), transparent 24%),
                linear-gradient(180deg, #f9fbff 0%, var(--page-bg) 100%);
        }
        button, input, select, textarea { font: inherit; }
        .container-shell { width: min(1180px, calc(100vw - 32px)); margin: 0 auto; }
        .site-nav {
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(228,235,243,.85);
        }
        .site-nav-inner { display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
        .brand-box, .brand-icon {
            display:grid; place-items:center; color:#fff;
            background:linear-gradient(135deg,#0ea5a1 0%,#0f8c88 100%);
            box-shadow:0 16px 34px rgba(14,165,161,.22);
        }
        .brand-box { width:56px; height:56px; border-radius:18px; font-size:1.35rem; }
        .brand-title { font-size:2rem; font-weight:700; line-height:1.05; color:var(--text-main); }
        .brand-subtitle { color:var(--text-soft); font-size:1rem; font-weight:500; }
        .nav-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
        .nav-action {
            display:inline-flex; align-items:center; gap:.5rem; padding:.85rem 1.15rem; border-radius:14px;
            border:1px solid var(--border); background:var(--surface); color:var(--text-main); text-decoration:none; font-weight:600;
            cursor:pointer;
        }
        .nav-action-primary, .btn-primary-strong {
            color:#fff; border-color:transparent; background:linear-gradient(135deg,#3151d6 0%,#243cb0 100%);
        }
        .hero-panel, .footer-panel, .station-card, .table-card, .form-card, .insight-card, .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }
        .hero-panel, .footer-panel, .table-card, .form-card, .insight-card { border-radius: var(--radius-xl); }
        .hero-title { font-size: clamp(2rem, 4vw, 3.45rem); line-height: 1.08; font-weight: 700; letter-spacing: -0.03em; margin: 0; }
        .hero-copy, .section-copy { color: var(--text-soft); font-size: 1.08rem; line-height: 1.8; }
        .metric-pill, .live-pill, .filter-chip, .info-chip, .review-button {
            display:inline-flex; align-items:center; gap:.55rem; padding:.85rem 1rem; border-radius:999px; border:1px solid var(--border); background:var(--surface-soft); font-weight:700;
        }
        .filter-bar { display:flex; gap:10px; flex-wrap:wrap; }
        .filter-chip.active { color:#fff; border-color:transparent; background:linear-gradient(135deg,#3151d6 0%,#243cb0 100%); }
        .station-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:24px; }
        .station-card { border-radius:24px; overflow:hidden; }
        .station-head { padding:26px 26px 18px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,#fff 0%,#fbfcfe 100%); }
        .station-body { padding:22px 26px; }
        .station-foot { padding:16px 26px; border-top:1px solid var(--border); background:#fbfcff; }
        .station-icon { width:60px; height:60px; border-radius:18px; display:grid; place-items:center; background:linear-gradient(135deg,#edf3ff 0%,#dbe6ff 100%); color:var(--primary); font-size:1.45rem; flex-shrink:0; }
        .station-name { font-size:1.95rem; line-height:1.14; font-weight:700; margin:0 0 .25rem; letter-spacing:-.02em; }
        .station-location { display:flex; align-items:center; gap:.5rem; color:var(--text-soft); font-size:1rem; }
        .status-badge { display:inline-flex; align-items:center; gap:.45rem; border-radius:999px; padding:.55rem .85rem; font-size:.9rem; font-weight:700; white-space:nowrap; }
        .status-available { background:var(--success-soft); color:var(--success); }
        .status-unavailable { background:var(--danger-soft); color:var(--danger); }
        .fuel-summary { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-bottom:18px; }
        .fuel-box, .detail-item, .switch-card, .form-section, .mobile-kv-item {
            border-radius:18px; border:1px solid var(--border); background:var(--surface-soft); padding:16px 18px;
        }
        .fuel-label, .detail-title, .summary-label, .mobile-kv-label { color:var(--text-soft); font-size:.86rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.35rem; }
        .fuel-value, .detail-value, .summary-value { font-weight:700; }
        .fuel-value { font-size:1.35rem; }
        .detail-list, .mobile-kv, .sidebar-nav, .activity-list { display:grid; gap:12px; }
        .detail-value { font-size:1.08rem; line-height:1.5; }
        .station-meta { display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; color:var(--text-soft); font-size:.92rem; font-weight:600; }
        .notice-box { max-width:760px; margin:0 auto; border-radius:22px; border:1px solid var(--border); background:#fbfdff; padding:22px; }
        .login-screen {
            min-height: calc(100vh - 60px);
            background:
                radial-gradient(circle at top, rgba(36, 72, 216, 0.18), transparent 26%),
                linear-gradient(135deg, #112648 0%, #16345f 48%, #eef4ff 100%);
            display:flex; align-items:center; padding:40px 0;
        }
        .login-card {
            border:0; border-radius:1.75rem; box-shadow:0 26px 70px rgba(12,24,47,.24); background:#fff;
        }
        .admin-page {
            min-height: calc(100vh - 60px);
            font-family: "Inter", sans-serif;
            color: var(--admin-text);
            background:
                radial-gradient(circle at top right, rgba(36,72,216,.08), transparent 22%),
                linear-gradient(180deg,#f8fbff 0%, var(--admin-bg) 100%);
        }
        .admin-app { min-height: calc(100vh - 60px); display:grid; grid-template-columns:290px minmax(0,1fr); }
        .admin-sidebar { position:sticky; top:60px; height:calc(100vh - 60px); padding:26px 20px; background:linear-gradient(180deg,#13294d 0%,#10233f 100%); color:#dbe7ff; }
        .sidebar-brand { display:flex; align-items:center; gap:14px; text-decoration:none; color:#fff; margin-bottom:28px; }
        .brand-icon { width:50px; height:50px; border-radius:16px; font-size:1.2rem; }
        .sidebar-title { font-size:1.1rem; font-weight:800; line-height:1.15; }
        .sidebar-subtitle { color:#9fb0ce; font-size:.9rem; }
        .sidebar-section-title { color:#8ea0bf; font-size:.76rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin:24px 0 12px; }
        .sidebar-link { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:16px; color:#d6e3ff; text-decoration:none; font-weight:600; cursor:pointer; }
        .sidebar-link.active { color:#fff; background:rgba(255,255,255,.08); box-shadow:inset 0 0 0 1px rgba(255,255,255,.06); }
        .sidebar-user { border-radius:20px; padding:16px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06); }
        .admin-main { padding:26px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
        .topbar-title { font-size:1.9rem; font-weight:800; line-height:1.1; margin:0 0 .35rem; }
        .topbar-copy { margin:0; color:var(--admin-soft); }
        .topbar-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .summary-card { padding:20px; height:100%; border-color:var(--admin-border); box-shadow:var(--admin-shadow); border-radius:24px; }
        .insight-card, .table-card, .form-card { border-color:var(--admin-border); box-shadow:var(--admin-shadow); }
        .insight-card { padding:22px; height:100%; }
        .insight-title, .form-section-title { font-size:1.05rem; font-weight:800; margin-bottom:.25rem; }
        .insight-copy, .form-section-copy { color:var(--admin-soft); font-size:.92rem; margin-bottom:18px; }
        .activity-item { display:flex; justify-content:space-between; gap:12px; padding:12px 0; border-top:1px solid var(--admin-border); }
        .activity-item:first-child { border-top:0; padding-top:0; }
        .summary-value { font-size:2rem; line-height:1; }
        .panel-header { padding:22px 24px 0; }
        .panel-body { padding:22px 24px 24px; }
        .table-card .table { margin-bottom:0; }
        .table-card td, .table-card th { padding:18px 20px; vertical-align:middle; border-color:var(--admin-border); }
        .table-card thead th { color:var(--admin-soft); font-size:.82rem; text-transform:uppercase; letter-spacing:.05em; font-weight:700; background:#fbfdff; }
        .station-tag, .admin-badge { display:inline-flex; align-items:center; gap:.4rem; padding:.45rem .8rem; border-radius:999px; font-weight:700; font-size:.82rem; }
        .station-tag { background:var(--admin-primary-soft); color:var(--admin-primary); }
        .admin-badge-success { background:#e8f8f0; color:var(--admin-success); }
        .admin-badge-danger { background:#ffedef; color:var(--admin-danger); }
        .form-card { padding:28px; }
        .form-actions { margin-top:18px; padding:12px; border-radius:18px; background:rgba(255,255,255,.94); border:1px solid var(--admin-border); }
        .review-toggle {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 1200;
            border: 0;
            border-radius: 999px;
            padding: 1rem 1.15rem;
            background: #13233d;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 18px 40px rgba(19,35,61,.24);
        }
        .review-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: min(420px, 100vw);
            height: 100vh;
            background: #fff;
            border-left: 1px solid var(--border);
            box-shadow: -18px 0 50px rgba(19,35,61,.12);
            z-index: 1250;
            transform: translateX(100%);
            transition: transform .25s ease;
            padding: 22px;
            overflow: auto;
        }
        .review-drawer.open { transform: translateX(0); }
        .screen { display:none; }
        .screen.active { display:block; }
        .hidden { display:none !important; }
        .clickable { cursor:pointer; }
        .soft-card { border:1px solid var(--border); background:#fbfdff; border-radius:18px; padding:16px; }
        @media (max-width: 991.98px) {
            .station-grid, .admin-app { grid-template-columns: 1fr; }
            .admin-sidebar { position: static; height: auto; }
        }
        @media (max-width: 767.98px) {
            .container-shell { width: min(100vw - 20px, 1180px); }
            .station-grid, .fuel-summary { grid-template-columns:1fr; }
            .brand-title { font-size:1.5rem; }
            .hero-title { font-size:1.9rem; }
            .station-name { font-size:1.5rem; }
            .topbar-title { font-size:1.45rem; }
        }
    </style>
</head>
<body>

                note: 'অকটেন এবং ডিজেল দুটিই পাওয়া যাচ্ছে।',
                reports: 14
            },
            {
                id: 2,
                name: 'ফয়েজিয়া বাজার ফিলিং স্টেশন',
                location: 'মেখল, ফয়েজিয়া বাজার, হাটহাজারী, চট্টগ্রাম',
                octane: true,
                diesel: false,
                crowd: 'low',
                crowd_label: 'ভিড় নেই (০-৩০ গাড়ি)',
                crowd_time: '৫ মিনিট আগে',
                updated_at: '২:১৮ PM',
                updated_human: '৪ মিনিট আগে',
                note: 'অকটেন পাওয়া যাচ্ছে, ডিজেল আপাতত নেই।',
                reports: 8
            },
            {
                id: 3,
                name: 'হাটহাজারী বাজার পেট্রোল পাম্প',
                location: 'হাটহাজারী সদর বাজার, হাটহাজারী, চট্টগ্রাম',
                octane: false,
                diesel: true,
                crowd: 'high',
                crowd_label: 'প্রচুর ভিড় (১২০+ গাড়ি)',
                crowd_time: '৩ মিনিট আগে',
                updated_at: '১:৫৬ PM',
                updated_human: '২৬ মিনিট আগে',
                note: 'ডিজেল পাওয়া যাচ্ছে, কিন্তু অকটেন নেই।',
                reports: 19
            },
            {
                id: 4,
                name: 'অক্সিজেন-হাটহাজারী সংযোগ ফুয়েল পয়েন্ট',
                location: 'অক্সিজেন সংযোগ সড়ক, হাটহাজারী লিংক, চট্টগ্রাম',
                octane: true,
                diesel: true,
                crowd: 'severe',
                crowd_label: 'ভয়াবহ অবস্থা (২৫০+ গাড়ি)',
                crowd_time: '১ মিনিট আগে',
                updated_at: '২:২১ PM',
                updated_human: 'এইমাত্র',
                note: 'পূর্ণ সরবরাহ আছে, কিন্তু লাইনের চাপ খুব বেশি।',
                reports: 27
            }
        ];

        const CROWD_REPORTS = [
            { station_id: 4, level: 'ভয়াবহ অবস্থা', ip: '103.21.244.8', time: '১ মিনিট আগে', exact: '29 Mar 2026, 02:21 PM' },
            { station_id: 3, level: 'প্রচুর ভিড়', ip: '203.76.101.12', time: '৩ মিনিট আগে', exact: '29 Mar 2026, 02:19 PM' },
            { station_id: 2, level: 'ভিড় নেই', ip: '27.147.140.22', time: '৫ মিনিট আগে', exact: '29 Mar 2026, 02:17 PM' },
            { station_id: 1, level: 'মাঝারি ভিড়', ip: '45.64.135.17', time: '৮ মিনিট আগে', exact: '29 Mar 2026, 02:14 PM' }
        ];

        const AUDIT_LOGS = [
            { action: 'station.created', user: 'ফুয়েল অ্যাডমিন', email: 'admin@fuelmonitor.test', target: 'Station', target_id: 4, description: 'নতুন স্টেশন এবং প্রাথমিক ফুয়েল স্ট্যাটাস তৈরি করা হয়েছে।', metadata: '{"name":"অক্সিজেন-হাটহাজারী সংযোগ ফুয়েল পয়েন্ট"}', time: '২ ঘণ্টা আগে', exact: '29 Mar 2026, 12:18 PM' },
            { action: 'station.status-updated', user: 'ফুয়েল অ্যাডমিন', email: 'admin@fuelmonitor.test', target: 'Station', target_id: 3, description: 'লাইভ ফুয়েল স্ট্যাটাস আপডেট করা হয়েছে।', metadata: '{"after":{"diesel":true}}', time: '২৬ মিনিট আগে', exact: '29 Mar 2026, 01:56 PM' },
            { action: 'crowd-report.deleted', user: 'হাটহাজারী অ্যাডমিন', email: 'admin@hathazari.com', target: 'CrowdReport', target_id: 18, description: 'একটি পাবলিক ক্রাউড রিপোর্ট মুছে ফেলা হয়েছে।', metadata: '{"station_name":"অক্সিজেন-হাটহাজারী সংযোগ ফুয়েল পয়েন্ট"}', time: '১৮ মিনিট আগে', exact: '29 Mar 2026, 02:04 PM' }
        ];

        const appState = {
            auth: JSON.parse(localStorage.getItem('fuel_static_auth') || 'null'),
            current: localStorage.getItem('fuel_static_screen') || 'public',
            selectedStationId: Number(localStorage.getItem('fuel_static_station') || '4'),
            reviewOpen: false,
            toast: ''
        };

        const app = document.getElementById('app');
        const reviewDrawer = document.getElementById('reviewDrawer');
        const reviewToggle = document.getElementById('reviewToggle');

        function bn(value) {
            return String(value).replace(/[0-9]/g, (d) => '০১২৩৪৫৬৭৮৯'[Number(d)]);
        }

        function stationById(id) {
            return STATIONS.find((station) => station.id === id) || STATIONS[0];
        }

        function countAvailable(key) {
            return STATIONS.filter((station) => station[key]).length;
        }

        function crowdClass(level) {
            if (level === 'low') return 'text-success';
            if (level === 'medium') return 'text-warning';
            return 'text-danger';
        }

        function badgeClass(level) {
            if (level === 'low') return 'status-available';
            if (level === 'medium') return 'status-available';
            return 'status-unavailable';
        }

        function ensureAllowedScreen() {
            const adminScreens = ['admin-dashboard', 'station-detail', 'station-form', 'crowd-reports', 'audit-logs'];
            if (!appState.auth && adminScreens.includes(appState.current)) {
                appState.current = 'login';
            }
        }

        function setScreen(screen) {
            appState.current = screen;
            localStorage.setItem('fuel_static_screen', screen);
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setStation(id) {
            appState.selectedStationId = id;
            localStorage.setItem('fuel_static_station', String(id));
        }

        function login(email, password) {
            const matched = DEMO_USERS.find((user) => user.email === email && user.password === password);
            if (!matched) {
                appState.toast = 'ইমেইল বা পাসওয়ার্ড সঠিক নয়। ডেমো লগইন ব্যবহার করুন।';
                render();
                return;
            }
            appState.auth = { email: matched.email, name: matched.name };
            localStorage.setItem('fuel_static_auth', JSON.stringify(appState.auth));
            appState.toast = 'সফলভাবে লগইন করা হয়েছে।';
            setScreen('admin-dashboard');
        }

        function logout() {

                <div class="table-card"><div class="panel-header"><div class="d-flex justify-content-between align-items-center gap-3 flex-wrap"><div><h2 class="h4 fw-bold mb-1">স্টেশন ম্যানেজমেন্ট</h2><p class="text-secondary mb-0">লাইভ স্টেশন রেকর্ড, ফুয়েল স্ট্যাটাস এবং রক্ষণাবেক্ষণ অ্যাকশন।</p></div><div class="d-flex gap-2 flex-wrap w-100" style="max-width:420px;"><input class="form-control rounded-4" value="হাটহাজারী"><button class="btn btn-outline-secondary rounded-4 px-3">খুঁজুন</button></div></div></div><div class="panel-body pt-4"><div class="table-responsive"><table class="table align-middle"><thead><tr><th>স্টেশন</th><th>লোকেশন</th><th>ফুয়েল স্ট্যাটাস</th><th>সর্বশেষ আপডেট</th><th class="text-end">অ্যাকশন</th></tr></thead><tbody>${STATIONS.map((station) => `<tr><td><div class="fw-bold fs-6">${station.name}</div><div class="small text-secondary mt-1">স্টেশন আইডি: ${bn(station.id)}</div></td><td><div class="text-secondary">${station.location}</div></td><td><span class="station-tag">অকটেন: ${station.octane ? 'আছে' : 'নাই'}</span> <span class="station-tag">ডিজেল: ${station.diesel ? 'আছে' : 'নাই'}</span></td><td><div class="fw-semibold">${station.updated_human}</div><div class="small text-secondary">${station.updated_at}</div></td><td class="text-end"><div class="d-flex justify-content-end gap-2 flex-wrap"><button class="btn btn-sm btn-outline-primary rounded-4" data-open-station="${station.id}">View</button><button class="btn btn-sm btn-outline-dark rounded-4" data-go="station-form">Edit</button></div></td></tr>`).join('')}</tbody></table></div></div></div>
            `;
            return adminLayout(content, 'স্টেশন ড্যাশবোর্ড', 'স্টেশন ইনভেন্টরি মনিটর করুন, ফুয়েল স্ট্যাটাস আপডেট করুন এবং পাবলিক ড্যাশবোর্ড নির্ভুল রাখুন।', 'dashboard');
        }
        function stationDetailScreen() {
            const station = stationById(appState.selectedStationId);
            const stationReports = CROWD_REPORTS.filter((item) => item.station_id === station.id);
            const content = `
                <div class="row g-4">
                    <div class="col-xl-4"><div class="insight-card"><div class="insight-title">${station.name}</div><div class="insight-copy">${station.location}</div><div class="row g-3"><div class="col-6"><div class="summary-card"><div class="summary-label">অকটেন</div><div class="summary-value ${station.octane ? 'text-success' : 'text-danger'}">${station.octane ? 'হ্যাঁ' : 'না'}</div></div></div><div class="col-6"><div class="summary-card"><div class="summary-label">ডিজেল</div><div class="summary-value ${station.diesel ? 'text-success' : 'text-danger'}">${station.diesel ? 'হ্যাঁ' : 'না'}</div></div></div><div class="col-12"><div class="summary-card"><div class="summary-label">সাম্প্রতিক ভিড়</div><div class="summary-value" style="font-size:1.3rem;">${station.crowd_label}</div><div class="small text-secondary mt-2">${station.crowd_time}</div></div></div></div></div></div>
                    <div class="col-xl-8"><div class="insight-card"><div class="insight-title">সাম্প্রতিক ক্রাউড টাইমলাইন</div><div class="insight-copy">এই স্টেশনের জন্য সর্বশেষ পাবলিক ভিড় সাবমিশন।</div>${stationReports.map((report) => `<div class="activity-item"><div><div class="fw-bold">${report.level}</div><div class="small text-secondary">${report.ip}</div></div><div class="small text-secondary text-end">${report.time}</div></div>`).join('')}</div></div>
                    <div class="col-12"><div class="table-card"><div class="panel-header"><h2 class="h4 fw-bold mb-1">ফুয়েল স্ট্যাটাস টাইমলাইন</h2><p class="text-secondary mb-0">স্টেশনটির সাম্প্রতিক জ্বালানি আপডেট ইতিহাস।</p></div><div class="panel-body"><div class="table-responsive"><table class="table align-middle"><thead><tr><th>অকটেন</th><th>ডিজেল</th><th>আপডেট সময়</th></tr></thead><tbody><tr><td>${station.octane ? 'Available' : 'Not Available'}</td><td>${station.diesel ? 'Available' : 'Not Available'}</td><td><div>${station.updated_human}</div><div class="small text-secondary">${station.updated_at}</div></td></tr><tr><td>Available</td><td>Available</td><td><div>২ ঘণ্টা আগে</div><div class="small text-secondary">12:18 PM</div></td></tr><tr><td>Available</td><td>Not Available</td><td><div>গতকাল</div><div class="small text-secondary">08:45 PM</div></td></tr></tbody></table></div></div></div></div>
                </div>
            `;
            return adminLayout(content, 'স্টেশন বিস্তারিত', 'স্টেশনের পূর্ণ প্রোফাইল, জ্বালানি প্রাপ্যতা এবং পাবলিক ভিড় ইতিহাস দেখুন।', 'detail');
        }

        function stationFormScreen() {
            const station = stationById(appState.selectedStationId);
            const content = `
                <div class="form-card">
                    <div class="mb-4"><h2 class="h3 fw-bold mb-1">স্টেশন তথ্য</h2><p class="text-secondary mb-0">স্টেশন প্রোফাইল, লোকেশন এবং প্রাথমিক ফুয়েল স্ট্যাটাস যোগ বা সম্পাদনা করুন।</p></div>
                    <div class="row g-4"><div class="col-12"><div class="form-section"><div class="form-section-title">বেসিক ইনফরমেশন</div><div class="form-section-copy">অ্যাডমিন ও পাবলিক ভিউ উভয় জায়গায় ব্যবহৃত নাম ও লোকেশন সেট করুন।</div><div class="row g-4"><div class="col-lg-6"><label class="form-label fw-semibold">স্টেশন নাম</label><input class="form-control" value="${station.name}"></div><div class="col-lg-6"><label class="form-label fw-semibold">লোকেশন</label><input class="form-control" value="${station.location}"></div></div></div></div><div class="col-12"><div class="form-section"><div class="form-section-title">ফুয়েল অ্যাভেইলেবিলিটি</div><div class="form-section-copy">পাবলিক ড্যাশবোর্ডে রিয়েল-টাইম স্ট্যাটাস দেখানোর জন্য বর্তমান অবস্থা সেট করুন।</div><div class="row g-4"><div class="col-lg-6"><div class="switch-card"><div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox" ${station.octane ? 'checked' : ''}><label class="form-check-label fw-semibold ms-2">অকটেন পাওয়া যাচ্ছে</label></div><div class="small text-secondary mt-2">অকটেন বর্তমানে পাওয়া গেলে এটি চালু রাখুন।</div></div></div><div class="col-lg-6"><div class="switch-card"><div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox" ${station.diesel ? 'checked' : ''}><label class="form-check-label fw-semibold ms-2">ডিজেল পাওয়া যাচ্ছে</label></div><div class="small text-secondary mt-2">ডিজেল বর্তমানে পাওয়া গেলে এটি চালু রাখুন।</div></div></div></div></div></div></div>
                    <div class="form-actions"><div class="d-flex gap-2 flex-wrap"><button class="btn btn-primary rounded-4 px-4 flex-grow-1" id="saveStationButton">স্টেশন আপডেট</button><button class="btn btn-outline-secondary rounded-4 px-4 flex-grow-1" data-go="admin-dashboard">বাতিল</button></div></div>
                </div>
            `;
            return adminLayout(content, 'স্টেশন যোগ / সম্পাদনা', 'স্টেশন রেকর্ড তৈরি করুন, আপডেট করুন এবং পাবলিক স্ট্যাটাসের সাথে সিঙ্ক রাখুন।', 'form');
        }

        function crowdReportsScreen() {
            const content = `
                <div class="table-card"><div class="panel-header"><div class="d-flex justify-content-between align-items-center gap-3 flex-wrap"><div><h2 class="h4 fw-bold mb-1">পাবলিক ক্রাউড অ্যাক্টিভিটি</h2><p class="text-secondary mb-0">স্টেশন ও ভিড়ের ধরন অনুযায়ী রিপোর্ট ফিল্টার করুন।</p></div><div class="d-flex gap-2 flex-wrap"><input class="form-control rounded-4" value="হাটহাজারী" style="width:180px"><select class="form-select rounded-4" style="width:160px"><option>সব লেভেল</option><option>কম ভিড়</option><option selected>প্রচুর ভিড়</option></select><input class="form-control rounded-4" value="2026-03-29" style="width:140px"><button class="btn btn-outline-secondary rounded-4">ফিল্টার</button></div></div></div><div class="panel-body"><div class="table-responsive"><table class="table align-middle"><thead><tr><th>স্টেশন</th><th>লেভেল</th><th>আইপি ঠিকানা</th><th>সাবমিট হয়েছে</th><th class="text-end">অ্যাকশন</th></tr></thead><tbody>${CROWD_REPORTS.map((report) => `<tr><td><div class="fw-bold">${stationById(report.station_id).name}</div><div class="small text-secondary">${stationById(report.station_id).location}</div></td><td>${report.level}</td><td>${report.ip}</td><td><div>${report.time}</div><div class="small text-secondary">${report.exact}</div></td><td class="text-end"><button class="btn btn-sm btn-outline-danger rounded-4">Delete</button></td></tr>`).join('')}</tbody></table></div></div></div>
            `;
            return adminLayout(content, 'ক্রাউড রিপোর্ট', 'ভিজিটরদের পাঠানো পাবলিক ভিড় তথ্য রিভিউ করুন এবং স্টেশনভিত্তিক ট্রেন্ড দেখুন।', 'crowd');
        }

        function auditLogsScreen() {
            const content = `
                <div class="table-card"><div class="panel-header"><div class="d-flex justify-content-between align-items-center gap-3 flex-wrap"><div><h2 class="h4 fw-bold mb-1">অ্যাডমিন অডিট ট্রেইল</h2><p class="text-secondary mb-0">ইউজার, অ্যাকশন অথবা ডিসক্রিপশন দিয়ে সার্চ করে গুরুত্বপূর্ণ পরিবর্তন ট্রেস করুন।</p></div><div class="d-flex gap-2 flex-wrap"><input class="form-control rounded-4" value="ফুয়েল অ্যাডমিন" style="width:180px"><select class="form-select rounded-4" style="width:180px"><option>সব অ্যাকশন</option><option selected>station.created</option><option>station.status-updated</option></select><button class="btn btn-outline-secondary rounded-4">ফিল্টার</button></div></div></div><div class="panel-body"><div class="table-responsive"><table class="table align-middle"><thead><tr><th>অ্যাকশন</th><th>অ্যাডমিন ইউজার</th><th>টার্গেট</th><th>বিবরণ</th><th>সময়</th></tr></thead><tbody>${AUDIT_LOGS.map((log) => `<tr><td><span class="station-tag">${log.action}</span></td><td><div class="fw-bold">${log.user}</div><div class="small text-secondary">${log.email}</div></td><td><div class="fw-bold">${log.target}</div><div class="small text-secondary">ID: ${log.target_id}</div></td><td><div>${log.description}</div><div class="small text-secondary mt-1">${log.metadata}</div></td><td><div>${log.time}</div><div class="small text-secondary">${log.exact}</div></td></tr>`).join('')}</tbody></table></div></div></div>
            `;
            return adminLayout(content, 'অডিট লগ', 'অ্যাডমিন পরিবর্তনের হিসাব রাখুন, অ্যাকাউন্টেবিলিটি নিশ্চিত করুন এবং অপারেশনাল পরিবর্তন পরীক্ষা করুন।', 'audit');
        }
        function reviewPanel() {
            reviewDrawer.className = `review-drawer ${appState.reviewOpen ? 'open' : ''}`;
            reviewDrawer.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div><div class="fw-bold fs-4">রিভিউ অপশন</div><div class="text-secondary">ডেমো HTML সম্পর্কে দ্রুত নোট</div></div>
                    <button class="btn btn-outline-secondary rounded-4" id="closeReviewDrawer">বন্ধ</button>
                </div>
                <div class="soft-card mb-3"><div class="fw-bold mb-2">ডেমো লগইন</div><div class="small text-secondary">admin@hathazari.com / admin@1234</div><div class="small text-secondary">admin@fuelmonitor.test / password</div></div>
                <div class="soft-card mb-3"><div class="fw-bold mb-2">অতিরিক্ত ফিচার</div><div class="small text-secondary">১. ফেক লগইন স্টেট মনে রাখে।<br>২. স্টেশন কার্ড থেকে বিস্তারিত স্ক্রিনে যাওয়া যায়।<br>৩. একই HTML ফাইলে পাবলিক ও অ্যাডমিন স্ক্রিন আছে।</div></div>
                <div class="soft-card"><div class="fw-bold mb-2">সীমাবদ্ধতা</div><div class="small text-secondary">এটি স্ট্যাটিক HTML, তাই ব্যাকএন্ড ডাটাবেস, আসল ফর্ম সাবমিশন, বাস্তব API এবং সার্ভার-সাইড ভ্যালিডেশন নেই। কিন্তু UI, নেভিগেশন এবং লগইন অভিজ্ঞতা ডেমো হিসেবে কাজ করবে।</div></div>
            `;
            const closeBtn = document.getElementById('closeReviewDrawer');
            if (closeBtn) closeBtn.onclick = () => { appState.reviewOpen = false; reviewPanel(); };
        }

        function render() {
            ensureAllowedScreen();
            let markup = '';
            if (appState.current === 'public') markup = publicScreen();
            if (appState.current === 'login') markup = loginScreen();
            if (appState.current === 'admin-dashboard') markup = adminDashboard();
            if (appState.current === 'station-detail') markup = stationDetailScreen();
            if (appState.current === 'station-form') markup = stationFormScreen();
            if (appState.current === 'crowd-reports') markup = crowdReportsScreen();
            if (appState.current === 'audit-logs') markup = auditLogsScreen();
            app.innerHTML = markup + (appState.toast ? `<div class="position-fixed top-0 start-50 translate-middle-x mt-3 alert alert-primary shadow-sm rounded-4" style="z-index:1300;">${appState.toast}</div>` : '');
            bindEvents();
            reviewPanel();
            if (appState.toast) {
                const message = appState.toast;
                setTimeout(() => {
                    if (appState.toast === message) {
                        appState.toast = '';
                        render();
                    }
                }, 2200);
            }
        }

        function bindEvents() {
            document.querySelectorAll('[data-go]').forEach((node) => {
                node.addEventListener('click', () => setScreen(node.getAttribute('data-go')));
            });
            document.querySelectorAll('[data-open-station]').forEach((node) => {
                node.addEventListener('click', () => {
                    setStation(Number(node.getAttribute('data-open-station')));
                    if (appState.auth) setScreen('station-detail');
                    else setScreen('login');
                });
            });
            document.querySelectorAll('[data-refresh]').forEach((node) => {
                node.addEventListener('click', () => {
                    appState.toast = 'ডেমো ডাটা রিফ্রেশ সম্পন্ন হয়েছে।';
                    render();
                });
            });
            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', (event) => {
                    event.preventDefault();
                    login(document.getElementById('loginEmail').value.trim(), document.getElementById('loginPassword').value.trim());
                });
            }
            const logoutButton = document.getElementById('logoutButton');
            if (logoutButton) logoutButton.addEventListener('click', logout);
            const saveStationButton = document.getElementById('saveStationButton');
            if (saveStationButton) {
                saveStationButton.addEventListener('click', () => {
                    appState.toast = 'স্টেশন আপডেট ডেমো হিসেবে সংরক্ষণ করা হয়েছে।';
                    render();
                });
            }
        }

        reviewToggle.addEventListener('click', () => {
            appState.reviewOpen = !appState.reviewOpen;
            reviewPanel();
        });

        render();
    </script>
</body>
</html>
